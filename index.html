<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nacho Average Dad Jokes</title>
    <meta
      name="description"
      content="Dad Joke Player - fetch random dad jokes, search by keyword, play audio, and save your favorites, right in the browser."
    />

    <!-- Matches the header so mobile browser chrome blends with the app. -->
    <meta name="theme-color" content="#222222" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nacho Average Dad Jokes" />
    <meta
      property="og:description"
      content="Fetch random dad jokes, search by keyword, play audio, and save your favorites."
    />
    <meta property="og:url" content="https://www.nachoaveragedadjoke.com/" />
    <meta property="og:image" content="https://www.nachoaveragedadjoke.com/favicon.svg" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-content">
        <button
          id="hamburger-menu"
          class="hamburger"
          aria-label="Show favorites"
          aria-controls="favorites-sidebar"
          aria-expanded="false"
        >
          &#9776;
        </button>
        <h1 class="site-title">Nacho Average Dad Jokes</h1>
        <form id="search-form">
          <input type="text" id="search-input" placeholder="Search jokes…" />
          <button type="submit">Search</button>
        </form>
      </div>
    </header>

    <!-- Backdrop dims the page while the favorites drawer is open. -->
    <div id="sidebar-backdrop" hidden></div>

    <!-- Favorites Sidebar -->
    <aside id="favorites-sidebar" aria-label="Favorites" aria-hidden="true" inert>
      <div class="sidebar-header">
        <span>Favorites</span>
        <button id="close-sidebar" aria-label="Close favorites">&times;</button>
      </div>
      <div id="favorites-sidebar-list"></div>
    </aside>

    <main>
      <!-- Search Section -->
      <section id="search-section">
        <div class="search-section-header">
          <h2>Search</h2>
          <button id="clear-search-btn">Clear Search</button>
        </div>
        <div id="search-results"></div>
        <button id="show-more-btn">Show More Results</button>
      </section>

      <!-- Random Joke Section -->
      <section id="joke-section">
        <h2>Random Joke</h2>
        <div id="joke-display" class="joke-box">
          <p class="joke-placeholder">
            Tap &ldquo;Get Random Joke&rdquo; for your first groaner. &#128516;
          </p>
        </div>
        <button id="random-joke-btn">Get Random Joke</button>
      </section>
    </main>

    <footer>
      <p>
        Built for laughs &middot;
        <a
          href="https://github.com/MattVolkin/dadjoke-frontend"
          target="_blank"
          rel="noopener noreferrer"
          >View source on GitHub</a
        >
      </p>
    </footer>

    <script src="config.js"></script>
    <!-- <script src="config.local.js"></script> --><!-- uncomment for local dev overrides; see README -->
    <script src="favorites.js"></script>
    <script src="app.js"></script>
  </body>
</html>
